name: Merge Version Bump PR

on:
  check_run:
    types: [completed]

jobs:
  merge-version-bump:
    # Run Action if external CI (here, CirrusCI) completed successfully and
    # an open PR is found with title starting with "Bump version to" on the
    # current branch.
    if: |
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.app.name == 'Cirrus CI'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find version bump PR for this commit
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.check_run.head_sha }}
        run: |
          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --json number,title,baseRefName,headRefName,commits \
            --jq --arg sha "$SHA" \
            '.[] | select(
                .title | startswith("Bump version to ")
            ) | select(
                .commits[] | .oid == $sha
            )')

          if [ -z "$PR" ]; then
            echo "No version bump PR found for branch $BRANCH, skipping."
            exit 0
          fi

          PR_NUMBER=$(echo "$PR" | jq -r '.number')
          BASE_REF=$(echo "$PR" | jq -r '.baseRefName')
          BRANCH=$(echo "$PR" | jq -r '.headRefName')
          TITLE=$(echo "$PR" | jq -r '.title')
          VERSION=$(echo "$TITLE" | grep -oP 'Bump version to \K.*')

          echo "pr_number=$PR_NUMBER"   >> $GITHUB_OUTPUT
          echo "base_ref=$BASE_REF"     >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"         >> $GITHUB_OUTPUT
          echo "version=$VERSION"       >> $GITHUB_OUTPUT

      - name: Merge version bump PR and delete branch
        if: steps.find_pr.outputs.pr_number != ''
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.find_pr.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --rebase \
            --delete-branch

      - name: Get merge commit SHA
        # When a PR is merged, the commit sha changes (!!!).
        # Look for the commit sha on the tip of the base branch.
        if: steps.find_pr.outputs.pr_number != ''
        id: merge_commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ steps.find_pr.outputs.base_ref }}
        run: |
          SHA=$(gh api \
            /repos/${{ github.repository }}/branches/$BASE_REF \
            --jq '.commit.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Comment on merge commit
        # Add a comment to the commit on the tip of the base branch
        # to trigger registration.
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.merge_commit.outputs.sha }}
          VERSION: ${{ steps.find_pr.outputs.version }}
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/commits/$SHA/comments" \
            --field body="✅ Version \`$VERSION\` merged automatically by @jsobot after CI passed."
            # --field-body="@JuliaRegistrator register"
