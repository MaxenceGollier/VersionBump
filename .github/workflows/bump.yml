name: Bump Version

on:
  issue_comment:
    types: [created]

jobs:
  bump-version:
    # Run this Action if a comment of the form "@jsobot version [major|minor|patch]" is posted.
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '@jsobot version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Parse version bump command
        # Determine whether a major, minor or patch version bump was requested.
        # Add the vesion part to the environment so other steps can read it.
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          PART=$(echo "$COMMENT" | grep -ioP '@jsobot version \K(major|minor|patch)')
          if [ -z "$PART" ]; then
            echo "Comment did not match expected format '@jsobot version [major|minor|patch]'"
            exit 1
          fi
          PART=$(echo "$PART" | tr '[:upper:]' '[:lower:]')
          echo "part=$PART" >> $GITHUB_OUTPUT

      - name: Merge PR via rebase
        # Merge the PR where the comment was posted to prepare for the version bump.
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'rebase'
            })

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.issue.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Bump version in Project.toml
        # Edit Project.toml to bump the version as requested in the PR comment.
        id: bump
        run: |
          julia --project=. << 'EOF'
          using TOML

          function bump_version(version::String, part::Symbol)::String
              parts = split(version, '.')
              length(parts) == 3 || throw(ArgumentError("Version must be in format 'major.minor.patch', got: $version"))
              all(all(isdigit, p) for p in parts) || throw(ArgumentError("Version parts must be numeric, got: $version"))

              major, minor, patch = parse.(Int, parts)

              major, minor, patch = if part == :major
                  (major + 1, 0, 0)
              elseif part == :minor
                  (major, minor + 1, 0)
              elseif part == :patch
                  (major, minor, patch + 1)
              else
                  throw(ArgumentError("part must be :major, :minor or :patch, got: $part"))
              end

              return "$major.$minor.$patch"
          end

          project = TOML.parsefile("Project.toml")
          old_version = project["version"]
          part = Symbol(ENV["PART"])
          new_version = bump_version(old_version, part)
          project["version"] = new_version
          open("Project.toml", "w") do io
              TOML.print(io, project)
          end

          open(ENV["GITHUB_OUTPUT"], "a") do io
              println(io, "old_version=$old_version")
              println(io, "new_version=$new_version")
          end

          println("OLD_VERSION=$old_version")
          println("NEW_VERSION=$new_version")
          EOF
        env:
          PART: ${{ steps.parse.outputs.part }}

      - name: Commit and push to new branch
        id: commit
        run: |
          BRANCH="jsobot/bump-version-${{ steps.bump.outputs.new_version }}"
          git config user.name  "jsobot"
          git config user.email "jsobot@users.noreply.github.com"
          git stash  # Project.toml has been modified
          git pull   # pull freshly merged branch
          git checkout -b $BRANCH
          git stash pop
          git add Project.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin $BRANCH
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open pull request
        id: open_pr
        # Label the pull request so CI runs on CirrusCI
        # because PRs created by a bot cannot trigger GitHub Actions.
        # See .cirrusci.yml.
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Bump version to ${{ steps.bump.outputs.new_version }}`,
              head: '${{ steps.commit.outputs.branch }}',
              base: 'main',
              body: `Automated version bump to \`${{ steps.bump.outputs.new_version }}\``
            })
            //await github.rest.issues.addLabels({
            //  owner: context.repo.owner,
            //  repo: context.repo.repo,
            //  issue_number: pr.data.number,
            //  labels: ['cirrusci']
            //})
            core.setOutput('pr_number', pr.data.number)

      - name: Close and reopen pull request
        # ... to trigger CI.
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.open_pr.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const pull_number = parseInt(process.env.PR_NUMBER)

            await github.rest.pulls.update({
              owner, repo, pull_number,
              state: 'closed'
            })

            await github.rest.pulls.update({
              owner, repo, pull_number,
              state: 'open'
            })
